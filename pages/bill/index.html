	<!-- main -->
	<body>
		<!-- Header -->
		<header class="header">
			<a href="/" class="logo"><b>永丞門窗</b></a>
			<nav>
				<ul>
					<li><a href="/"><b>首頁</b></a></li>
					<li><a href="../aboutme/"><b>關於永丞</b></a></li>
					<li class="dropdown-parent">
						<span class="opener"><b>產品系列</b></span>
						<ul class="dropdown">
							<li><a href="../product_1027/"><strong>理想隔音窗</strong></a></li>
							<li><a href="../product_1060/"><strong>信元氣密窗</strong></a></li>
							<li><a href="../product_door/"><strong>三合一通風門</strong></a></li>
							<li><a href="../product_mesh/"><strong>防霾紗窗</strong></a></li>
							<li><a href="../product_meshdoor/"><strong>金屬網摺疊門</strong></a></li>
						</ul>
					</li>
				</ul>
			</nav>
		</header>
		<main>
		<!-- container -->
        <div class="calculator">
            <div class="container">
                <h2>發票計算機</h2>

                <div class="row">
                    <label for="net">未稅金額:</label>
                    <input type="number" id="net" placeholder="輸入未稅價">
                </div>
                <div class="row">
                    <label>稅金:</label>
                    <span id="tax">0</span>
                </div>
                <div class="row">
                    <label for="gross">含稅金額:</label>
                    <input type="number" id="gross" placeholder="輸入含稅價">
                </div>
                <div class="row">
                    <label>中文金額:</label>
                    <div id="chineseAmount" class="amount-display" aria-label="發票金額欄位">
                        <div class="amount-cell amount-cell-empty" data-place="100000000">
                            <span class="amount-digit" aria-hidden="true"></span>
                            <span class="amount-unit">億</span>
                        </div>
                        <div class="amount-cell amount-cell-empty" data-place="10000000">
                            <span class="amount-digit" aria-hidden="true"></span>
                            <span class="amount-unit">仟</span>
                        </div>
                        <div class="amount-cell amount-cell-empty" data-place="1000000">
                            <span class="amount-digit" aria-hidden="true"></span>
                            <span class="amount-unit">佰</span>
                        </div>
                        <div class="amount-cell amount-cell-empty" data-place="100000">
                            <span class="amount-digit" aria-hidden="true"></span>
                            <span class="amount-unit">拾</span>
                        </div>
                        <div class="amount-cell amount-cell-empty" data-place="10000">
                            <span class="amount-digit" aria-hidden="true"></span>
                            <span class="amount-unit">萬</span>
                        </div>
                        <div class="amount-cell amount-cell-empty" data-place="1000">
                            <span class="amount-digit" aria-hidden="true"></span>
                            <span class="amount-unit">仟</span>
                        </div>
                        <div class="amount-cell amount-cell-empty" data-place="100">
                            <span class="amount-digit" aria-hidden="true"></span>
                            <span class="amount-unit">佰</span>
                        </div>
                        <div class="amount-cell amount-cell-empty" data-place="10">
                            <span class="amount-digit" aria-hidden="true"></span>
                            <span class="amount-unit">拾</span>
                        </div>
                        <div class="amount-cell amount-cell-zero" data-place="1">
                            <span class="amount-digit" aria-hidden="true">0</span>
                            <span class="amount-unit">元</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
		</main>

				</li>
